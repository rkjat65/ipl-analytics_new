# Railway/Nixpacks configuration for Python + Node.js monorepo
providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20", "npm"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -r requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
